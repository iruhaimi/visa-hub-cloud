<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فتح واتساب</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: hsl(210 20% 97%);
        color: hsl(221 39% 11%);
      }

      main {
        width: min(100%, 420px);
        background: hsl(0 0% 100%);
        border-radius: 24px;
        padding: 32px 24px;
        box-shadow: 0 24px 70px hsl(221 39% 11% / 0.12);
        text-align: center;
      }

      .badge {
        width: 72px;
        height: 72px;
        border-radius: 999px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        background: hsl(142 70% 49% / 0.14);
        color: hsl(142 70% 49%);
        font-size: 30px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        line-height: 1.8;
        color: hsl(220 9% 38%);
      }

      .actions {
        margin-top: 22px;
        display: grid;
        gap: 12px;
      }

      .button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        width: 100%;
        min-height: 52px;
        padding: 14px 18px;
        border: 0;
        border-radius: 16px;
        background: hsl(142 70% 49%);
        color: hsl(0 0% 100%);
        font-size: 1rem;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .button.secondary {
        background: hsl(210 40% 95%);
        color: hsl(221 39% 11%);
      }

      small {
        display: block;
        margin-top: 14px;
        color: hsl(220 9% 46%);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">💬</div>
      <h1>جارٍ فتح واتساب</h1>
      <p id="description">نجهز لك التحويل الآن. إذا لم يتم فتح واتساب تلقائياً اضغط الزر التالي.</p>

      <div class="actions">
        <a id="open-link" class="button" href="#" rel="noopener noreferrer">فتح واتساب</a>
        <button id="back-button" class="button secondary" type="button">العودة للموقع</button>
      </div>

      <small>تمت إضافة هذه الخطوة لتفادي حظر واتساب داخل المعاينة.</small>
    </main>

    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const targetUrl = params.get('target');
        const openLink = document.getElementById('open-link');
        const backButton = document.getElementById('back-button');
        const description = document.getElementById('description');

        const isEmbedded = () => {
          try {
            return window.self !== window.top;
          } catch {
            return true;
          }
        };

        if (!targetUrl) {
          description.textContent = 'تعذر إنشاء رابط واتساب. ارجع للموقع وأعد المحاولة.';
          openLink.removeAttribute('href');
          openLink.setAttribute('aria-disabled', 'true');
          openLink.style.opacity = '0.6';
          openLink.style.pointerEvents = 'none';
        } else {
          openLink.href = targetUrl;
          openLink.target = isEmbedded() ? '_blank' : '_self';
        }

        backButton.addEventListener('click', () => {
          if (window.history.length > 1) {
            window.history.back();
            return;
          }

          window.location.href = '/';
        });

        if (!targetUrl) {
          return;
        }

        if (!isEmbedded()) {
          window.location.replace(targetUrl);
          return;
        }

        try {
          if (window.top && window.top !== window) {
            window.top.location.assign(targetUrl);
            return;
          }
        } catch {
          // Ignore and keep manual fallback button visible.
        }

        const popup = window.open(targetUrl, '_blank');
        if (popup) {
          try {
            popup.opener = null;
          } catch {
            // Ignore opener access issues.
          }
        }
      })();
    </script>
  </body>
</html>
